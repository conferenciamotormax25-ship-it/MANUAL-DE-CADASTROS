<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual de Cadastro Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0c14;
            --surface: #131722;
            --border: #1e293b;
            --accent: #3b82f6;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg);
            color: #f1f5f9;
            -webkit-font-smoothing: antialiased;
        }

        .font-mono { font-family: 'JetBrains Mono', monospace; }

        /* Estilo da Linha (Modo Lista) */
        .registro-row {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }

        .registro-row:hover {
            border-color: var(--accent);
            transform: translateX(4px);
            background: #1a1f2e;
        }

        /* Estilo do Card Clássico (Modo Cards) */
        .registro-card {
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .registro-card:hover {
            transform: translateY(-5px);
            border-color: var(--accent);
            background: rgba(30, 41, 59, 0.8);
            box-shadow: 0 15px 30px -10px rgba(0,0,0,0.5);
        }

        /* Estilo Terminal */
        .terminal-box {
            background: #000000;
            border-radius: 8px;
            padding: 12px 16px;
            border: 1px solid #1e293b;
            color: #fbbf24;
            font-size: 0.85rem;
            cursor: pointer;
            position: relative;
            line-height: 1.5;
        }

        /* Botão COPIAR em Português */
        .terminal-box::after {
            content: 'COPIAR';
            position: absolute;
            right: 8px;
            top: 8px;
            font-size: 9px;
            opacity: 0;
            transition: all 0.2s ease;
            background: #3b82f6;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: 900;
            letter-spacing: 0.5px;
            transform: translateY(-2px);
        }

        .registro-card:hover .terminal-box::after,
        .registro-row:hover .terminal-box::after {
            opacity: 1;
            transform: translateY(0);
        }

        /* Legendas EDITAR e EXCLUIR */
        .btn-action {
            position: relative;
        }

        .btn-action::before {
            content: attr(data-label);
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%) translateY(5px);
            background: #1e293b;
            color: white;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 8px;
            font-weight: 900;
            opacity: 0;
            pointer-events: none;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .registro-card:hover .btn-action::before {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* View Toggle */
        .view-toggle {
            display: flex;
            background: #1e293b;
            padding: 4px;
            border-radius: 10px;
        }
        .view-btn {
            padding: 6px 14px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            color: #64748b;
            transition: all 0.2s;
        }
        .view-btn.active { background: #3b82f6; color: white; }

        .copy-toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: #10b981;
            color: white;
            padding: 12px 24px;
            border-radius: 99px;
            font-weight: 900;
            font-size: 12px;
            z-index: 9999;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { transform: translate(-50%, 20px); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        .layout-list { grid-template-columns: 1fr !important; }
        .layout-grid { grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); }
    </style>
</head>
<body class="pb-20">

    <div id="app">
        <!-- Header -->
        <div class="sticky top-0 z-50 bg-[#0a0c14]/90 backdrop-blur-xl border-b border-white/5">
            <div class="max-w-7xl mx-auto px-6 py-4">
                <div class="flex flex-col md:flex-row items-center gap-6">
                    <div class="flex items-center gap-4 shrink-0">
                        <h1 class="text-xl font-black italic uppercase tracking-tighter">
                            <span class="text-blue-500">Manual</span> Pro
                        </h1>
                        <div class="h-4 w-[1px] bg-slate-800"></div>
                        <div class="flex items-center gap-2">
                            <div id="status-dot" class="w-2 h-2 rounded-full bg-yellow-500"></div>
                            <span id="contador-total" class="text-[10px] font-bold text-blue-400">0</span>
                        </div>
                    </div>

                    <!-- Busca -->
                    <div class="relative flex-1 w-full">
                        <input id="inputPesquisa" type="text" placeholder="BUSCAR REGISTRO..." 
                            class="w-full bg-black/50 border border-slate-800 h-11 px-10 rounded-xl text-sm font-bold focus:border-blue-500 outline-none transition-all uppercase placeholder:text-slate-700">
                        <svg class="w-4 h-4 absolute left-4 top-3.5 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    </div>

                    <div class="flex items-center gap-4 shrink-0">
                        <div id="viewToggle" class="view-toggle">
                            <button onclick="changeView('list')" id="btn-list" class="view-btn">Lista</button>
                            <button onclick="changeView('grid')" id="btn-grid" class="view-btn active">Cards</button>
                        </div>
                        <button onclick="abrirModal()" class="bg-blue-600 hover:bg-blue-500 text-white h-11 px-6 rounded-xl font-black text-[10px] uppercase transition-all flex items-center gap-2">
                            + NOVO <span class="opacity-40 hidden md:inline">ALT+N</span>
                        </button>
                    </div>
                </div>

                <!-- Filtros Letras -->
                <div id="filtros-letras" class="flex gap-1 overflow-x-auto no-scrollbar py-3 mt-2 border-t border-white/5"></div>
            </div>
        </div>

        <!-- Container Principal -->
        <main id="listaItens" class="max-w-7xl mx-auto p-6 grid gap-6 transition-all layout-grid">
            <div class="col-span-full text-center py-20 text-slate-800 font-black uppercase text-[10px] tracking-widest">
                Carregando banco de dados...
            </div>
        </main>
    </div>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 bg-black/95 backdrop-blur-md z-[1000] hidden items-center justify-center p-4">
        <div class="bg-[#131722] p-8 rounded-3xl w-full max-w-xl border border-slate-800 shadow-2xl">
            <div class="flex justify-between items-center mb-6">
                <h2 id="modalTitle" class="text-lg font-black text-white italic uppercase">CADASTRO</h2>
                <button onclick="fecharModal()" class="text-slate-500 hover:text-white transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <input type="hidden" id="form-id">
            <div class="space-y-4">
                <div>
                    <label class="text-[9px] font-black text-slate-500 uppercase mb-1 block">Veículo / Modelo / Ano</label>
                    <input id="form-veiculo" class="w-full bg-black border border-slate-800 p-4 rounded-xl outline-none focus:border-blue-500 text-white font-bold uppercase transition-all">
                </div>
                <div>
                    <label class="text-[9px] font-black text-slate-500 uppercase mb-1 block">Especificação Técnica</label>
                    <textarea id="form-descricao" rows="4" class="w-full bg-black border border-slate-800 p-4 rounded-xl outline-none focus:border-amber-500 text-amber-500 font-mono text-sm uppercase resize-none font-bold"></textarea>
                </div>
                <div>
                    <label class="text-[9px] font-black text-slate-500 uppercase mb-1 block">Observação</label>
                    <input id="form-obs" class="w-full bg-black border border-slate-800 p-4 rounded-xl outline-none focus:border-red-500 text-red-500 text-xs uppercase font-bold">
                </div>
            </div>
            <div class="flex gap-3 mt-8">
                <button onclick="salvar()" class="flex-1 bg-blue-600 hover:bg-blue-500 p-4 rounded-xl font-black text-white uppercase text-xs transition-all">GRAVAR <span class="opacity-50">ALT+G</span></button>
                <button onclick="fecharModal()" class="px-6 bg-slate-800 hover:bg-slate-700 rounded-xl font-black text-slate-400 uppercase text-xs transition-all">VOLTAR</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, doc, updateDoc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB_R6SA5eHMJAKoXgDPZ4KQQXnCLaC4tuU",
            authDomain: "meus-cadastros-248bb.firebaseapp.com",
            projectId: "meus-cadastros-248bb",
            storageBucket: "meus-cadastros-248bb.appspot.com",
            messagingSenderId: "82593809676",
            appId: "1:82593809676:web:38f7881edab34a628f3529"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        
        let dadosOriginais = [];
        let filtroLetra = "";
        let currentView = 'grid';

        const login = async () => {
            try {
                await signInAnonymously(auth);
                document.getElementById('status-dot').classList.replace('bg-yellow-500', 'bg-emerald-500');
            } catch (e) {
                document.getElementById('status-dot').classList.replace('bg-yellow-500', 'bg-red-500');
            }
            iniciarEscuta();
        };

        function iniciarEscuta() {
            onSnapshot(query(collection(db, "cadastros_veiculos")), (snapshot) => {
                dadosOriginais = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                renderizar();
            });
        }

        window.changeView = (mode) => {
            currentView = mode;
            const main = document.getElementById('listaItens');
            document.getElementById('btn-list').classList.toggle('active', mode === 'list');
            document.getElementById('btn-grid').classList.toggle('active', mode === 'grid');
            
            if(mode === 'list') {
                main.classList.remove('layout-grid');
                main.classList.add('layout-list');
            } else {
                main.classList.remove('layout-list');
                main.classList.add('layout-grid');
            }
            renderizar();
        };

        function renderizar() {
            const lista = document.getElementById('listaItens');
            const busca = document.getElementById('inputPesquisa').value.toLowerCase();
            
            const filtrados = dadosOriginais.filter(item => {
                const searchTxt = ((item.veiculo || "") + (item.descricao || "") + (item.obs || "")).toLowerCase();
                const matchLetra = !filtroLetra || (item.veiculo || "").toUpperCase().startsWith(filtroLetra);
                return searchTxt.includes(busca) && matchLetra;
            }).sort((a,b) => (a.veiculo || "").localeCompare(b.veiculo || ""));

            document.getElementById('contador-total').innerText = filtrados.length;

            if(filtrados.length === 0) {
                lista.innerHTML = `<div class="col-span-full py-20 text-center text-slate-700 font-bold uppercase text-[10px]">Nenhum registro encontrado</div>`;
                return;
            }

            if(currentView === 'list') {
                lista.innerHTML = filtrados.map(item => `
                    <div class="registro-row p-5 flex flex-col md:flex-row gap-5 items-start">
                        <div class="md:w-1/4">
                            <span class="text-[9px] font-black text-slate-600 block mb-1">VEÍCULO</span>
                            <h3 class="font-black text-sm text-white uppercase leading-tight">${item.veiculo}</h3>
                            ${item.obs ? `<p class="text-[10px] text-red-500 font-bold mt-2">● ${item.obs}</p>` : ''}
                        </div>
                        <div class="flex-1 w-full">
                            <span class="text-[9px] font-black text-slate-600 block mb-1">DESCRIÇÃO</span>
                            <div class="terminal-box font-mono" onclick="window.copiarTexto('${item.id}')">${item.descricao}</div>
                        </div>
                        <div class="flex md:flex-col gap-2 w-full md:w-32 justify-end">
                            <button onclick="window.editarItem('${item.id}')" class="flex-1 bg-slate-800 hover:bg-slate-700 text-[9px] font-black py-2 rounded-lg transition-all">EDITAR</button>
                            <button onclick="window.excluirItem('${item.id}')" class="flex-1 bg-red-900/20 hover:bg-red-900/40 text-red-500 text-[9px] font-black py-2 rounded-lg transition-all">APAGAR</button>
                        </div>
                    </div>
                `).join('');
            } else {
                lista.innerHTML = filtrados.map(item => `
                    <div class="registro-card">
                        <div class="flex justify-between items-start">
                            <div class="flex-1">
                                <span class="text-[9px] font-black text-blue-500 uppercase tracking-widest block mb-1">REGISTRO</span>
                                <h3 class="font-black text-lg text-white uppercase leading-tight">${item.veiculo}</h3>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="window.editarItem('${item.id}')" data-label="EDITAR" class="btn-action p-2 bg-white/5 hover:bg-blue-600 rounded-lg text-slate-400 hover:text-white transition-all">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                                </button>
                                <button onclick="window.excluirItem('${item.id}')" data-label="EXCLUIR" class="btn-action p-2 bg-white/5 hover:bg-red-600 rounded-lg text-slate-400 hover:text-white transition-all">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                                </button>
                            </div>
                        </div>
                        <div class="terminal-box flex-1 min-h-[100px] font-mono flex items-center justify-center text-center" onclick="window.copiarTexto('${item.id}')">
                            ${item.descricao}
                        </div>
                        ${item.obs ? `
                            <div class="bg-red-500/10 border border-red-500/20 p-3 rounded-xl">
                                <span class="text-[8px] font-black text-red-500 uppercase block mb-1">Observação</span>
                                <p class="text-[10px] text-red-200 font-bold uppercase leading-relaxed">${item.obs}</p>
                            </div>
                        ` : ''}
                    </div>
                `).join('');
            }
        }

        window.copiarTexto = (id) => {
            const item = dadosOriginais.find(d => d.id === id);
            navigator.clipboard.writeText(item.descricao).then(() => {
                const toast = document.createElement('div');
                toast.className = 'copy-toast';
                toast.innerText = 'ESPECIFICAÇÃO COPIADA!';
                document.body.appendChild(toast);
                setTimeout(() => toast.remove(), 1500);
            });
        };

        window.abrirModal = (id = null) => {
            const item = id ? dadosOriginais.find(d => d.id === id) : null;
            document.getElementById('form-id').value = id || "";
            document.getElementById('form-veiculo').value = item?.veiculo || "";
            document.getElementById('form-descricao').value = item?.descricao || "";
            document.getElementById('form-obs').value = item?.obs || "";
            document.getElementById('modalTitle').innerText = id ? "EDITAR" : "CADASTRAR";
            document.getElementById('modal').style.display = 'flex';
            setTimeout(() => document.getElementById('form-veiculo').focus(), 100);
        };

        window.fecharModal = () => document.getElementById('modal').style.display = 'none';

        window.salvar = async () => {
            const id = document.getElementById('form-id').value;
            const dados = {
                veiculo: document.getElementById('form-veiculo').value.toUpperCase().trim(),
                descricao: document.getElementById('form-descricao').value.toUpperCase().trim(),
                obs: document.getElementById('form-obs').value.toUpperCase().trim(),
                atualizadoEm: serverTimestamp()
            };
            if(!dados.veiculo || !dados.descricao) return;
            try {
                if(id) await updateDoc(doc(db, "cadastros_veiculos", id), dados);
                else await addDoc(collection(db, "cadastros_veiculos"), dados);
                fecharModal();
            } catch (e) { console.error(e); }
        };

        window.editarItem = (id) => window.abrirModal(id);
        window.excluirItem = async (id) => {
            if(confirm("EXCLUIR PERMANENTEMENTE?")) await deleteDoc(doc(db, "cadastros_veiculos", id));
        };

        window.setFiltro = (l) => {
            filtroLetra = l;
            renderizar();
            document.querySelectorAll('.btn-l').forEach(b => {
                const active = (l === b.dataset.l);
                b.className = `btn-l w-8 h-8 flex items-center justify-center rounded-lg text-[10px] font-black transition-all ${active ? 'bg-blue-600 text-white shadow-lg shadow-blue-500/50' : 'bg-slate-900 text-slate-500 hover:bg-slate-800'}`;
            });
        };

        const alphabet = "#ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        document.getElementById('filtros-letras').innerHTML = alphabet.split("").map(l => `
            <button onclick="window.setFiltro('${l === '#' ? '' : l}')" data-l="${l === '#' ? '' : l}" class="btn-l w-8 h-8 flex items-center justify-center rounded-lg text-[10px] font-black bg-slate-900 text-slate-500 hover:bg-slate-800 transition-all">
                ${l}
            </button>
        `).join("");

        window.addEventListener('keydown', (e) => {
            if (e.altKey && e.key.toLowerCase() === 'n') { e.preventDefault(); abrirModal(); }
            if (e.altKey && e.key.toLowerCase() === 'g' && document.getElementById('modal').style.display === 'flex') { e.preventDefault(); salvar(); }
        });

        document.getElementById('inputPesquisa').addEventListener('input', renderizar);
        
        login();
        window.setFiltro('');
    </script>
</body>
</html>
